<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>老年社会工作伦理案例库 | 专业实践指南</title>
    <style>
        * {

            padding: 0;
            box-sizing: border-box;
        }

        }

        /* 容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 3px solid #d9b48b;
        }
        .header h1 {
            font-size: 2.2rem;
            color: #8b5a2b;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header h1 span {
            background: #e9d5b5;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 1rem;
            vertical-align: middle;
        }
        .subhead {
            font-size: 1.1rem;
            color: #6b4c2c;
            margin-top: 0.75rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        .ethics-badge {
            background: #f0e2cf;
            border-radius: 30px;
            padding: 0.2rem 1rem;
            display: inline-block;
            font-size: 0.85rem;
            margin-top: 12px;
        }

        /* 筛选栏 */
        .filters {
            background: #fff6ea;
            padding: 1.2rem 1.5rem;
            border-radius: 32px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #f0e0ca;
        }
        .search-box {
            display: flex;
            margin-bottom: 1.2rem;
        }
        .search-box input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 1px solid #e2cfb5;
            border-radius: 48px;
            font-size: 1rem;
            background: white;
            outline: none;
            transition: 0.2s;
        }
        .search-box input:focus {
            border-color: #c29a6b;
            box-shadow: 0 0 0 2px rgba(194,154,107,0.2);
        }
        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            align-items: center;
        }
        .tag-label {
            font-weight: 600;
            color: #7a582e;
            margin-right: 0.3rem;
        }
        .tag-btn {
            background: #f2e5d6;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #4e3a24;
            font-weight: 500;
        }
        .tag-btn.active {
            background: #c29a6b;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .tag-btn:hover {
            background: #dbbc97;
            color: #2c2418;
        }
        .reset-btn {
            background: #e2cfb5;
            color: #5c3e1f;
            margin-left: 0.5rem;
        }
        .stats {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #8f734b;
            text-align: right;
        }

        /* 案例卡片网格 */
        .cases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0;
        }
        .case-card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            transition: all 0.25s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #f3e4d2;
            display: flex;
            flex-direction: column;
        }
        .case-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 28px rgba(0,0,0,0.08);
            border-color: #e5ceb0;
        }
        .card-content {
            padding: 1.5rem;
            flex: 1;
        }
        .card-title {
            font-size: 1.45rem;
            font-weight: 700;
            color: #8b5a2b;
            margin-bottom: 0.6rem;
            line-height: 1.3;
        }
        .card-desc {
            color: #5a4a36;
            margin: 0.8rem 0;
            font-size: 0.95rem;
        }
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 1rem 0 0.8rem;
        }
        .tag {
            background: #f1e8dd;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #7a582e;
            letter-spacing: 0.3px;
        }
        .btn-detail {
            background: transparent;
            border: 1.5px solid #d9b48b;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-weight: 600;
            color: #8b5a2b;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.8rem;
            width: fit-content;
            font-size: 0.85rem;
        }
        .btn-detail:hover {
            background: #d9b48b;
            color: white;
            border-color: #d9b48b;
        }
        .no-results {
            text-align: center;
            padding: 3rem;
            background: #fff3e6;
            border-radius: 48px;
            color: #a47e54;
            grid-column: 1 / -1;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #fffcf7;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            border-radius: 32px;
            overflow-y: auto;
            padding: 1.8rem 2rem;
            position: relative;
            box-shadow: 0 25px 40px rgba(0,0,0,0.2);
            border: 1px solid #eedbc8;
        }
        .modal-close {
            position: absolute;
            top: 18px;
            right: 22px;
            font-size: 32px;
            font-weight: 300;
            cursor: pointer;
            color: #a67c52;
            transition: 0.2s;
            line-height: 1;
        }
        .modal-close:hover {
            color: #5c3e1f;
        }
        .modal-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #8b5a2b;
            margin-bottom: 1.2rem;
            padding-right: 2rem;
        }
        .modal-section {
            margin-bottom: 1.5rem;
        }
        .modal-section h4 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #a57248;
            border-left: 4px solid #d9b48b;
            padding-left: 0.8rem;
            margin-bottom: 0.6rem;
        }
        .modal-section p, .modal-section ul {
            color: #2e2a24;
            margin-left: 0.5rem;
            line-height: 1.5;
        }
        .modal-section ul {
            padding-left: 1.5rem;
        }
        .reference {
            background: #f9efE4;
            padding: 0.8rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #7c5e3c;
            margin-top: 1rem;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            padding: 1.5rem 0;
            border-top: 1px solid #ecdbba;
            color: #b49063;
            font-size: 0.85rem;
        }

        @media (max-width: 680px) {
            .container {
                padding: 1rem;
            }
            .cases-grid {
                grid-template-columns: 1fr;
            }
            .modal-content {
                padding: 1.5rem;
            }
            .modal-title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>
            📚 老年社会工作伦理案例库
            <span>专业·反思·实践</span>
        </h1>
        <div class="subhead">基于社会工作伦理守则 | 聚焦老年服务中的伦理冲突与正确解决路径</div>
        <div class="ethics-badge">✨ NASW伦理准则 & 中国社工伦理指引 融合参考</div>
    </div>

    <div class="filters">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 搜索案例标题、情境或伦理冲突..." autocomplete="off">
        </div>
        <div class="tag-group">
            <span class="tag-label">📌 伦理主题筛选：</span>
            <div id="filterTagsContainer" class="tag-group" style="display: inline-flex; flex-wrap: wrap; gap: 0.5rem;"></div>
            <button id="resetFilterBtn" class="tag-btn reset-btn">重置全部</button>
        </div>
        <div class="stats" id="statsInfo">加载案例中...</div>
    </div>

    <div id="casesGrid" class="cases-grid">
        <!-- 动态渲染卡片 -->
    </div>
    <footer>
        ⚖️ 本案例库供教育及专业参考，伦理决策需结合具体情境及督导意见。<br>
        依据《社会工作伦理守则》及老年社会工作最佳实践构建，尊重多元文化。
    </footer>
</div>

<!-- 模态框 -->
<div id="caseModal" class="modal">
    <div class="modal-content">
        <span class="modal-close">&times;</span>
        <div id="modalDynamicContent">
            <!-- 动态填充案例详情 -->
        </div>
    </div>
</div>

            fullSituation: "72岁身体尚好的孙爷爷入住某养老院，院方出于安全考虑规定房门不得反锁，且外出需家人书面申请，孙爷爷感觉尊严受损，情绪低落。",
            ethicalIssues: "机构风险管控 vs 老人自由权；自治与安全；制度化歧视。",
            resolution: "1. 评估老人的实际风险水平，倡导基于个人能力实施差异化政策。2. 与机构管理层协商，针对低风险老人开放自由门禁时段及私密空间。3. 社工协助孙爷爷及其他老人成立住民主席团，反馈意见。4. 推动机构从过度保护转向“积极冒险”伦理，平衡安全与自主。",
            principles: ["自主权", "正常化", "倡导"],
            reference: "积极冒险理念；老年社工倡导角色。"
        },
        {
            id: 10,
            title: "付费第三方要求透露老人信息",
            shortDesc: "子女全额支付养老费用，要求社工提供父亲全部医疗及心理评估记录，老人不同意透露。",
            fullSituation: "赵伯伯入住机构由儿子支付所有费用，但赵伯伯明确拒绝让儿子知道自己最近抑郁症诊断和用药记录，儿子却以“付款人有权知道”为由索要全部档案。",
            ethicalIssues: "第三方付费者的知情权 vs 案主隐私权；保密及信息分享界限。",
            resolution: "1. 向儿子解释社工保密伦理：老人是服务对象，即使第三方付费也不能违背知情同意。2. 获得老人书面同意后才可分享必要的基本信息（如整体健康进展，不涉及具体隐私细节）。3. 协助家庭沟通，让老人自行决定透露多少。4. 若老人拒绝提供任何信息，坚守保密立场，同时与机构政策对齐。",
            principles: ["隐私保密", "案主中心", "专业责任"],
            reference: "NASW 1.07(a) 隐私权；HIPAA隐私规则类比。"
        }
    ];

    // 提取所有标签（去重）
    function getAllTags() {
        const tagSet = new Set();
        casesData.forEach(c => {
            c.principles.forEach(t => tagSet.add(t));
        });
        return Array.from(tagSet).sort();
    }

    // 渲染标签筛选按钮
    function renderFilterTags(activeTag = null) {
        const container = document.getElementById('filterTagsContainer');
        const tags = getAllTags();
        let html = '';
        tags.forEach(tag => {
            const activeClass = (activeTag === tag) ? 'active' : '';
            html += `<button class="tag-btn ${activeClass}" data-filter-tag="${tag}">${tag}</button>`;
        });
        container.innerHTML = html;
        // 绑定筛选事件
        document.querySelectorAll('[data-filter-tag]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const selectedTag = btn.getAttribute('data-filter-tag');
                const currentActive = document.querySelector('.tag-btn.active[data-filter-tag]');
                if (currentActive && currentActive.getAttribute('data-filter-tag') === selectedTag) {
                    // 如果已是激活，则重置
                    resetFilters();
                } else {
                    applyFilters(selectedTag, document.getElementById('searchInput').value);
                }
            });
        });
    }

    let currentTagFilter = null;
    let currentSearchTerm = '';

    function applyFilters(tagFilter, searchTerm) {
        currentTagFilter = tagFilter;
        currentSearchTerm = searchTerm;
        // 更新按钮高亮
        document.querySelectorAll('[data-filter-tag]').forEach(btn => {
            const btnTag = btn.getAttribute('data-filter-tag');
            if (currentTagFilter && btnTag === currentTagFilter) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        renderCases();
    }

    function resetFilters() {
        currentTagFilter = null;
        currentSearchTerm = '';
        document.getElementById('searchInput').value = '';
        document.querySelectorAll('[data-filter-tag]').forEach(btn => btn.classList.remove('active'));
        renderCases();
    }

    // 渲染卡片
    function renderCases() {
        const grid = document.getElementById('casesGrid');
        let filtered = [...casesData];
        
        // 标签筛选
        if (currentTagFilter) {
            filtered = filtered.filter(c => c.principles.includes(currentTagFilter));
        }
        // 搜索筛选 (标题、短描述、完整情境、伦理冲突)
        if (currentSearchTerm && currentSearchTerm.trim() !== '') {
            const term = currentSearchTerm.trim().toLowerCase();
            filtered = filtered.filter(c => 
                c.title.toLowerCase().includes(term) ||
                c.shortDesc.toLowerCase().includes(term) ||
                c.fullSituation.toLowerCase().includes(term) ||
                c.ethicalIssues.toLowerCase().includes(term)
            );
        }
        
        const stats = document.getElementById('statsInfo');
        stats.innerText = `📋 共 ${filtered.length} 个案例 (总计 ${casesData.length})`;
        
        if (filtered.length === 0) {
            grid.innerHTML = `<div class="no-results">✨ 没有找到匹配的案例，试试其他筛选词或重置筛选 ✨</div>`;
            return;
        }
        
        let cardsHtml = '';
        filtered.forEach(c => {
            const tagSpans = c.principles.map(tag => `<span class="tag">${tag}</span>`).join('');
            cardsHtml += `
                <div class="case-card" data-id="${c.id}">
                    <div class="card-content">
                        <div class="card-title">${escapeHtml(c.title)}</div>
                        <div class="card-desc">${escapeHtml(c.shortDesc)}</div>
                        <div class="card-tags">${tagSpans}</div>
                        <button class="btn-detail" data-id="${c.id}">📖 查看详细分析</button>
                    </div>
                </div>
            `;
        });
        grid.innerHTML = cardsHtml;
        
        // 绑定详情按钮事件
        document.querySelectorAll('.btn-detail').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                const caseItem = casesData.find(c => c.id === id);
                if (caseItem) openModal(caseItem);
            });
        });
    }
    
    // 简单防XSS
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    // 模态框显示详情
    function openModal(caseData) {
        const modal = document.getElementById('caseModal');
        const modalContentDiv = document.getElementById('modalDynamicContent');
        const principlesHtml = caseData.principles.map(p => `<span class="tag" style="background:#e9d5b5; margin-right:8px;">${p}</span>`).join('');
        const resolutionSteps = caseData.resolution.replace(/\n/g, '<br>').replace(/[0-9]+\./g, match => `<strong>${match}</strong>`);
        
        modalContentDiv.innerHTML = `
            <div class="modal-title">📌 ${escapeHtml(caseData.title)}</div>
            <div class="modal-section">
                <h4>📋 情境描述</h4>
                <p>${escapeHtml(caseData.fullSituation)}</p>
            </div>
            <div class="modal-section">
                <h4>⚡ 伦理冲突点</h4>
                <p>${escapeHtml(caseData.ethicalIssues)}</p>
            </div>
            <div class="modal-section">
                <h4>✅ 正确解决方式 (伦理决策行动)</h4>
                <p>${resolutionSteps}</p>
            </div>
            <div class="modal-section">
                <h4>🏷️ 相关伦理原则</h4>
                <div>${principlesHtml}</div>
            </div>
            <div class="reference">
                📖 参考依据：${escapeHtml(caseData.reference)}<br>
                💡 基于社会工作伦理决策模型，强调保护案主福祉、尊重自决与正义。
            </div>
        `;
        modal.style.display = 'flex';
    }
    
    // 关闭模态框
    function closeModal() {
        const modal = document.getElementById('caseModal');
        modal.style.display = 'none';
    }
    
    // 初始化页面
    function init() {
        renderFilterTags();
        renderCases();
        // 搜索事件
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            applyFilters(currentTagFilter, e.target.value);
        });
        const resetBtn = document.getElementById('resetFilterBtn');
        resetBtn.addEventListener('click', () => {
            resetFilters();
        });
        // 模态框关闭
        const modal = document.getElementById('caseModal');
        window.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
        document.querySelector('.modal-close').addEventListener('click', closeModal);
    }
    
    init();
</script>
</body>
